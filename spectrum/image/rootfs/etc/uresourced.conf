[Global]
# Hard protection is capped separately from soft reclaim protection. The active
# user gets ancestor allocations so session.slice MemoryMin/MemoryLow can take
# effect in the cgroup tree.
MaxMemoryMin=10%
MaxMemoryLow=30%

[ActiveUser]
MemoryMin=5%
MemoryLow=25%
IOWeight=500
CPUWeight=500

[SessionSlice]
# uresourced/Fedora unit drop-ins place GNOME Shell/Mutter, PipeWire,
# WirePlumber, and core portals in session.slice.
MemoryMin=768M
MemoryLow=20%
IOWeight=1000
CPUWeight=1000

[AppBoost]
ActiveCPUWeight=300
ActiveIOWeight=300
BoostCPUWeightInc=200
BoostIOWeightInc=200
