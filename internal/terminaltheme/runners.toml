[[runner]]
name = "codex"
programs = [
  "$TERMINAL_THEME_RUN_CODEX_BIN",
  "$CODEX_TERMINAL_THEME_CODEX_BIN",
  "~/.bun/bin/codex",
  "~/.cache/.bun/bin/codex",
  "~/.npm/bin/codex",
  "codex",
]
default_args = ["--dangerously-bypass-approvals-and-sandbox"]
skip_env = ["TERMINAL_THEME_RUN_CODEX_WRAPPER"]
env_unset = ["NO_COLOR"]
env = ["COLORTERM=truecolor"]
env_overlay = "codex-trust"

[[runner]]
name = "btop"
programs = ["btop"]
skip_env = ["TERMINAL_THEME_RUN_WRAPPER", "BTOP_AUTO_THEME_WRAPPER"]
env_unset = ["NO_COLOR"]
env = ["COLORTERM=truecolor"]

[runner.config]
format = "ini"
default_path = "~/.config/btop/btop.conf"
arg_names = ["--config", "-c"]
output_args = ["--config"]
cache_subdir = "terminal-theme-run/btop"
temp_pattern = "terminal-theme-run-btop-*.conf"

[[runner.config.update]]
path = "color_theme"
dark = "catppuccin_frappe_pink"
light = "catppuccin_latte_pink"
quote = true

[[runner]]
name = "helix"
programs = ["~/.local/share/dotfiles/helix-tip/bin/hx", "hx", "helix"]
skip_env = ["TERMINAL_THEME_RUN_WRAPPER", "HELIX_AUTO_THEME_WRAPPER"]

[runner.config]
format = "toml"
default_path = "~/.config/helix/config.toml"
arg_names = ["--config", "-c"]
output_args = ["--config"]
temp_pattern = "terminal-theme-run-helix-*.toml"

[[runner.config.update]]
path = "theme"
dark = "catppuccin_frappe_pink"
light = "catppuccin_latte_pink"

[[runner]]
name = "ghostty"
programs = ["ghostty"]
skip_env = ["TERMINAL_THEME_RUN_WRAPPER", "GHOSTTY_AUTO_THEME_WRAPPER"]

[[runner.theme_arg]]
dark = "--theme=catppuccin-frappe-pink.conf"
light = "--theme=catppuccin-latte-pink.conf"
